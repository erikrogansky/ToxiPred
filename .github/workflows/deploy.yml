name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    if: "!contains(github.event.head_commit.message, '[skip-deploy]')"

    steps:
      - name: Pull latest code
        run: |
          cd /home/toxipred/ToxiPred
          git pull origin main

      - name: Deploy
        run: |
          cd /home/toxipred/ToxiPred
          ./scripts/deploy.sh deploy

      - name: Verify
        if: success()
        run: |
          cd /home/toxipred/ToxiPred
          ./scripts/deploy.sh status
